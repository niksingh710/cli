scan_timeout = 10

add_newline = false

[battery]
disabled = true

[character]
success_symbol = "[’äģ](blue)"
error_symbol = "[’äģ](bright-red)"

[cmd_duration]
show_notifications = true
min_time_to_notify = 60_000

[directory]
truncation_length = 1
format = "[’Éō](blue) [$path]($style)[$read_only]($read_only_style) "
read_only = " ’ĆŻ"
truncation_symbol = ""
fish_style_pwd_dir_length = 0

[lua]
symbol="ŅśĀ "

[git_branch]
format = ":[$symbol$branch]($style)"
symbol = "Ņ£ź "

[git_state]
format = '\(:[$state( $progress_current/$progress_total)]($style)\)'

[git_status]
format = '(:[$all_status$ahead_behind]($style)) '
conflicted = '\[’Ā╣ [$count](bright-white bold)\]'
ahead = '\[[’»ü ](bright-blue)[$count](bright-white bold)\]'
behind = '\[[’«Š ](white)[$count](bright-white bold)\]'
diverged = '\[[Ņ£© ](purple)|[ ’»ü ](bright-blue)[$ahead_count](bright-white bold)[ ’«Š ](white)[$behind_count](bright-white)\]'
untracked = '\[’Ŗ£ [$count](bright-white bold)\]'
stashed = '\[[’Ż¢](yellow) [$count](bright-white bold)\]'
modified = '\[[’ö” ](bright-yellow)[$count](bright-white bold)\]'
staged = '\[[’æŚ ](bright-green)[$count](bright-white bold)\]'
renamed = '\[[’æÜ ](bright-cyan) [$count](bright-white bold)\]'
deleted = '\[’Ćö [$count](bright-white bold)\]'

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[custom.git_host]
command = """
URL=$(command git ls-remote --get-url 2> /dev/null)

if [[ "$URL" =~ "github" ]]; then
    ICON="’éø "
elif [[ "$URL" =~ "gitlab" ]]; then
    ICON="’Ŗ¢ "
elif [[ "$URL" =~ "bitbucket" ]];then
    ICON="’ģ▒ "
elif [[ "$URL" =~ "kernel" ]];then
    ICON="Ņ£Æ "
elif [[ "$URL" =~ "archlinux" ]];then
    ICON="’īā "
elif [[ "$URL" =~ "gnu" ]];then
    ICON="ŅØ╣ "
elif [[ "$URL" =~ "git" ]];then
    ICON="Ņ£é "
else
    ICON="’ćÆ "
    URL="localhost"
fi

for PATTERN in "https" "http" "git" "://" "@"; do
    [[ "$URL" == "$PATTERN"* ]] && URL="${URL##$PATTERN}"
done

for PATTERN in "/" ".git"; do
    [[ "$URL" == *"$PATTERN" ]] && URL="${URL%%$PATTERN}"
done
printf "%s%s" "$ICON" "$URL"
"""
directories = [".git"]
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash","--norc","--noprofile"]
style = "bright-yellow bold"
format = " at [$output]($style)"

[hostname]
disabled = true
